<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Buzzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            touch-action: manipulation;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        
        .setup-screen, .buzzer-screen {
            display: none;
        }
        
        .setup-screen.active, .buzzer-screen.active {
            display: block;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .input-group {
            margin: 30px 0;
        }
        
        label {
            display: block;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #FFD700;
        }
        
        input, select {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid #FFD700;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            background: rgba(255,255,255,0.9);
            color: #000;
        }
        
        button {
            padding: 15px 40px;
            font-size: 1.3em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #00AA00;
            color: white;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .player-name {
            font-size: 3em;
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .buzzer {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 8px solid #8b0000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0 auto;
            transition: all 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .buzzer.glenn {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc0000);
        }
        
        .buzzer.marsha {
            background: radial-gradient(circle at 30% 30%, #6b9fff, #0044cc);
            border-color: #003388;
        }
        
        .buzzer:active:not(:disabled) {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 -2px 10px rgba(0,0,0,0.5);
        }
        
        .buzzer.buzzed {
            background: radial-gradient(circle at 30% 30%, #ffd700, #ffaa00) !important;
            border-color: #cc8800 !important;
            animation: pulse 0.5s ease-in-out;
        }
        
        .buzzer:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .status {
            margin-top: 30px;
            font-size: 1.5em;
            min-height: 40px;
        }
        
        .status.active {
            color: #FFD700;
            font-weight: bold;
        }
        
        .status.error {
            color: #ff6b6b;
        }
        
        .score-display {
            font-size: 2em;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        
        .waiting-message {
            margin-top: 20px;
            font-size: 1.2em;
            color: #FFD700;
            padding: 20px;
            background: rgba(255,215,0,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="setup-screen active" id="setupScreen">
            <h1>🎯 Jeopardy Buzzer</h1>
            
            <div class="input-group">
                <label for="gameCode">Enter Game Code:</label>
                <input type="text" id="gameCode" placeholder="XXXX" maxlength="4">
            </div>
            
            <div class="input-group">
                <label for="playerSelect">Select Player:</label>
                <select id="playerSelect">
                    <option value="">-- Choose Your Name --</option>
                    <option value="glenn">Glenn</option>
                    <option value="marsha">Marsha</option>
                </select>
            </div>
            
            <button id="btnJoin">Join Game</button>
            <div class="status" id="setupStatus"></div>
        </div>
        
        <div class="buzzer-screen" id="buzzerScreen">
            <h1>🎯 Buzzer</h1>
            <div class="player-name" id="playerName"></div>
            <div class="waiting-message" id="waitingMessage">Waiting for game to start...</div>
            <div id="buzzerContainer" style="display: none;">
                <div class="buzzer" id="buzzer">BUZZ!</div>
                <div class="status" id="status">Ready</div>
                <div class="score-display" id="scoreDisplay">Score: $0</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBpVGc8YqGz5xH_K9pW3TL1j9fQNvXm5hY",
            authDomain: "jeopardy-buzzer-c4cd1.firebaseapp.com",
            databaseURL: "https://jeopardy-buzzer-c4cd1-default-rtdb.firebaseio.com",
            projectId: "jeopardy-buzzer-c4cd1",
            storageBucket: "jeopardy-buzzer-c4cd1.firebasestorage.app",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let gameId = null;
        let playerName = null;
        let canBuzz = false;

        document.getElementById('btnJoin').onclick = async () => {
            gameId = document.getElementById('gameCode').value.toUpperCase().trim();
            playerName = document.getElementById('playerSelect').value;
            
            if (!gameId || gameId.length !== 4) {
                document.getElementById('setupStatus').textContent = 'Please enter a valid 4-character game code';
                document.getElementById('setupStatus').classList.add('error');
                return;
            }
            
            if (!playerName) {
                document.getElementById('setupStatus').textContent = 'Please select a player';
                document.getElementById('setupStatus').classList.add('error');
                return;
            }
            
            const gameRef = ref(db, `games/${gameId}`);
            const snapshot = await get(gameRef);
            
            if (!snapshot.exists()) {
                document.getElementById('setupStatus').textContent = 'Game not found. Check the code!';
                document.getElementById('setupStatus').classList.add('error');
                return;
            }
            
            await update(ref(db, `games/${gameId}/players`), {
                [playerName]: true
            });
            
            document.getElementById('setupScreen').classList.remove('active');
            document.getElementById('buzzerScreen').classList.add('active');
            document.getElementById('playerName').textContent = playerName.toUpperCase();
            document.getElementById('buzzer').classList.add(playerName);
            
            setupBuzzer();
        };

        function setupBuzzer() {
            const buzzer = document.getElementById('buzzer');
            const status = document.getElementById('status');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const waitingMessage = document.getElementById('waitingMessage');
            const buzzerContainer = document.getElementById('buzzerContainer');
            
            onValue(ref(db, `games/${gameId}/started`), (snapshot) => {
                if (snapshot.val() === true) {
                    waitingMessage.style.display = 'none';
                    buzzerContainer.style.display = 'block';
                }
            });
            
            onValue(ref(db, `games/${gameId}/currentQ`), (snapshot) => {
                const question = snapshot.val();
                if (question) {
                    canBuzz = true;
                    buzzer.disabled = false;
                    status.textContent = 'Ready to buzz!';
                    status.classList.remove('active');
                } else {
                    canBuzz = false;
                    buzzer.disabled = true;
                    status.textContent = 'Waiting for next question...';
                }
            });
            
            onValue(ref(db, `games/${gameId}/buzzed`), (snapshot) => {
                const buzzedPlayer = snapshot.val();
                if (buzzedPlayer) {
                    canBuzz = false;
                    buzzer.disabled = true;
                    if (buzzedPlayer === playerName) {
                        status.textContent = 'YOU BUZZED IN!';
                        status.classList.add('active');
                    } else {
                        status.textContent = `${buzzedPlayer.toUpperCase()} buzzed in`;
                    }
                }
            });
            
            onValue(ref(db, `games/${gameId}/scores/${playerName}`), (snapshot) => {
                const score = snapshot.val() || 0;
                scoreDisplay.textContent = `Score: $${score}`;
            });
            
            buzzer.addEventListener('click', async () => {
                if (canBuzz) {
                    canBuzz = false;
                    buzzer.classList.add('buzzed');
                    buzzer.disabled = true;
                    
                    await update(ref(db, `games/${gameId}`), {
                        buzzed: playerName
                    });
                    
                    setTimeout(() => {
                        buzzer.classList.remove('buzzed');
                    }, 500);
                }
            });
            
            window.addEventListener('beforeunload', () => {
                update(ref(db, `games/${gameId}/players`), {
                    [playerName]: false
                });
            });
        }

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
